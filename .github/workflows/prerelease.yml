name: Prerelease

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*-dev*'

jobs:
  prerelease:
    name: Publish prerelease
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build zip files
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
          make build release=0   # dev build

      - name: Get zip filename
        id: get-zip-filename
        run: |
          ZIP_NAME=$(cd ..; ls plugin.video.netflix*.zip | head -1)
          echo "zip-filename=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Get body
        id: get-body
        run: |
          {
            echo "body<<EOF"
            echo "⚠️ **Experimental prerelease**"
            echo
            echo "Intended for testing and likely unstable."
            echo
            sed '/v[0-9\.]*\s([0-9-]*)/d;/^$/,$d' changelog.md
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Prerelease and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "../${{ steps.get-zip-filename.outputs.zip-filename }}" \
            --title "Prerelease: ${{ github.ref_name }}" \
            --notes "${{ steps.get-body.outputs.body }}" \
            --prerelease
