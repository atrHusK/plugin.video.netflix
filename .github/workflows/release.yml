name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    name: Publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build zip files
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
          make build release=1

      - name: Get zip filename
        id: get-zip-filename
        run: |
          ZIP_NAME=$(cd ..; ls plugin.video.netflix*.zip | head -1)
          echo "zip-filename=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Get body
        id: get-body
        run: |
          {
            echo "body<<EOF"
            sed '/v[0-9\.]*\s([0-9-]*)/d;/^$/,$d' changelog.md
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # GitHub CLI creates the release and attaches the file all in one go
        run: |
          gh release create "${{ github.ref_name }}" \
            "../${{ steps.get-zip-filename.outputs.zip-filename }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.get-body.outputs.body }}"
